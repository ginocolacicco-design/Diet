/* ═══ CUSTOM MEAL OBJECT ═══ */
/* Stored per (dayIdx, slotKey) in a single localStorage blob */
const DEFAULT_CUSTOM={title:"Pasto libero",kcal:400,p:20,c:40,g:15,notes:""};

function makeCustomMeal(custom){
  const c=custom||DEFAULT_CUSTOM;
  return{
    id:CUSTOM_ID,
    title:c.title||"Pasto libero",
    items:c.notes?[c.notes]:["Inserisci qui il tuo pasto personalizzato","I valori di kcal e macro sono modificabili","Utile per piatti gestiti fuori dal database"],
    kcal:Number(c.kcal)||0,
    p:Number(c.p)||0,
    c:Number(c.c)||0,
    g:Number(c.g)||0,
    t:["v","vg","gf","lf"],
    tip:"Pasto gestito in autonomia. Modifica kcal e macro nel pannello.",
    shop:[],
    isCustom:true
  };
}

/* ═══ CALC ═══ */
function calcBmr(p){const b=10*p.weight+6.25*p.height-5*p.age;return Math.round(p.sex==="M"?b+5:b-161)}
function calcTdee(p){return Math.round(calcBmr(p)*(ACT.find(a=>a.id===p.activity)||ACT[2]).f)}
function calcTgt(p){return Math.round(calcTdee(p)*(1-(DEFL.find(d=>d.id===p.deficit)||DEFL[1]).p))}
function calcMacros(p){const t=calcTgt(p),pG=Math.round(p.weight*1.8),fG=Math.round(p.weight*.9),cG=Math.round(Math.max(t-pG*4-fG*9,200)/4);return{target:t,pG,fG,cG}}
function slotScale(slot,prof){const d=DIST.find(x=>x.id===prof.dist)||DIST[0];const w=d.w[slot]||0;if(w===0)return 0;return(calcTgt(prof)*w/100)/(BASE_AVG[slot]||400)}
function isSlotActive(slot,prof){const d=DIST.find(x=>x.id===prof.dist)||DIST[0];return(d.w[slot]||0)>0}
function slotTargetKcal(slot,prof){const d=DIST.find(x=>x.id===prof.dist)||DIST[0];return Math.round(calcTgt(prof)*(d.w[slot]||0)/100)}

/* ═══ HELPERS ═══ */
function find(pool,id){return pool.find(m=>m.id===id)||pool[0]}
function lp(){try{const s=localStorage.getItem(PK);if(s)return{...defProf,...JSON.parse(s)}}catch(e){}return{...defProf}}
function lw(){try{const s=localStorage.getItem(WK);if(s)return JSON.parse(s)}catch(e){}return[]}
function lc(){try{const s=localStorage.getItem(CK);if(s)return JSON.parse(s)}catch(e){}return{}}
function customKey(dayIdx,slot){return`${dayIdx}-${slot}`}
function initSel(){try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);if(p&&p[0])return p}}catch(e){}const r={};DN.forEach((_,i)=>{r[i]={social:false,colazione:M.colazione[i%M.colazione.length].id,spuntino1:M.spuntino1[i%M.spuntino1.length].id,pranzo:M.pranzo[i%M.pranzo.length].id,spuntino2:M.spuntino2[i%M.spuntino2.length].id,cena:M.cena[i%M.cena.length].id,socialCena:M.social[0].id,socialColazione:SC[0].id,socialSpuntino1:SS1[0].id,socialPranzo:SP[0].id,socialSpuntino2:SS2[0].id}});return r}
function filt(pool,filters){if(!filters||!filters.length)return pool;const r=pool.filter(m=>filters.every(f=>m.t&&m.t.includes(f)));return r.length?r:pool}
/* Pool with custom option appended */
function pwc(pool,filters){return[...filt(pool,filters),{id:CUSTOM_ID,title:"✏️ Pasto libero (inserisci tu)",kcal:0,t:["v","vg","gf","lf"]}]}

function getMeals(sel,i,filters,customs){
  const s=sel[i];
  const resolve=(pool,id,slotName)=>{
    if(id===CUSTOM_ID){const c=customs[customKey(i,slotName)];return makeCustomMeal(c)}
    return find(pool,id);
  };
  if(s.social)return{
    colazione:resolve(SC,s.socialColazione,"colazione"),
    spuntino1:resolve(SS1,s.socialSpuntino1,"spuntino1"),
    pranzo:resolve(SP,s.socialPranzo,"pranzo"),
    spuntino2:resolve(SS2,s.socialSpuntino2,"spuntino2"),
    cena:resolve(M.social,s.socialCena,"cena")
  };
  return{
    colazione:resolve(M.colazione,s.colazione,"colazione"),
    spuntino1:resolve(M.spuntino1,s.spuntino1,"spuntino1"),
    pranzo:resolve(M.pranzo,s.pranzo,"pranzo"),
    spuntino2:resolve(M.spuntino2,s.spuntino2,"spuntino2"),
    cena:resolve(M.cena,s.cena,"cena")
  };
}

function dayKcal(sel,i,prof,customs){
  const meals=getMeals(sel,i,prof.filters||[],customs);
  let total=0;
  SLOTS.forEach(slot=>{
    if(!isSlotActive(slot,prof))return;
    const meal=meals[slot];
    // Custom meals: kcal is absolute, not scaled
    total+=meal.isCustom?meal.kcal:Math.round(meal.kcal*slotScale(slot,prof));
  });
  return total;
}

function buildShop(sel,prof,customs){const map={};const filters=prof.filters||[];for(let i=0;i<7;i++){const ms=getMeals(sel,i,filters,customs);SLOTS.forEach(slot=>{if(!isSlotActive(slot,prof))return;(ms[slot].shop||[]).forEach(({cat,item})=>{const k=cat+"||"+item;if(!map[k])map[k]={cat,item,days:[]};map[k].days.push(DS[i])})})}const g={};Object.values(map).forEach(e=>{if(!g[e.cat])g[e.cat]=[];g[e.cat].push(e)});return g}

function WeightChart({entries,goalWeight}){
  if(!entries.length)return<div style={{textAlign:"center",padding:"40px 20px",color:"#b0a89e",fontSize:14}}>Aggiungi la prima pesata per il grafico</div>;
  const sorted=[...entries].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const ws=sorted.map(e=>e.weight);const minW=Math.min(...ws,goalWeight)-2,maxW=Math.max(...ws)+2,range=maxW-minW||1;
  const W=640,H=260,PX=50,PY=20,cW=W-PX*2,cH=H-PY*2;
  const pts=sorted.map((e,i)=>({x:PX+(sorted.length>1?i/(sorted.length-1):.5)*cW,y:PY+(1-(e.weight-minW)/range)*cH}));
  const goalY=PY+(1-(goalWeight-minW)/range)*cH;
  const path=pts.map((p,i)=>`${i?'L':'M'}${p.x} ${p.y}`).join(' ');
  const steps=5;const yL=[];for(let i=0;i<=steps;i++){const v=minW+range*(i/steps);yL.push({y:PY+(1-i/steps)*cH,l:Math.round(v)})}
  return(<svg viewBox={`0 0 ${W} ${H+20}`} style={{width:"100%"}}>
    {yL.map((l,i)=><g key={i}><line x1={PX} y1={l.y} x2={W-PX} y2={l.y} stroke="#e8e4de" strokeWidth=".5"/><text x={PX-8} y={l.y+4} textAnchor="end" fill="#b0a89e" fontSize="10" fontFamily="DM Sans">{l.l}</text></g>)}
    <line x1={PX} y1={goalY} x2={W-PX} y2={goalY} stroke="#E07B9B" strokeWidth="1.5" strokeDasharray="6 4" opacity=".7"/>
    <text x={W-PX+6} y={goalY+4} fill="#E07B9B" fontSize="10" fontWeight="600" fontFamily="DM Sans">{goalWeight}kg</text>
    {pts.length>1&&<path d={path} fill="none" stroke="#7B5EA7" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
    {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r="5" fill="#7B5EA7" stroke="#fff" strokeWidth="2"/><text x={p.x} y={p.y-12} textAnchor="middle" fill="#5a5550" fontSize="10" fontWeight="600" fontFamily="DM Sans">{sorted[i].weight}</text></g>)}
    {sorted.length>0&&sorted.map((e,i)=>{if(sorted.length<=7||i%(Math.ceil(sorted.length/6))===0||i===sorted.length-1)return<text key={i} x={pts[i].x} y={H+12} textAnchor="middle" fill="#b0a89e" fontSize="9" fontFamily="DM Sans">{e.date.split('-').slice(1).reverse().join('/')}</text>;return null})}
  </svg>);
}
function WeightTracker({profile}){
  const[entries,setE]=useState(lw),[nw,setNw]=useState(''),[nd,setNd]=useState(new Date().toISOString().split('T')[0]);
  useEffect(()=>{try{localStorage.setItem(WK,JSON.stringify(entries))}catch(e){}},[entries]);
  const add=()=>{const w=parseFloat(nw);if(!w||w<30||w>300)return;setE(p=>[...p.filter(e=>e.date!==nd),{date:nd,weight:w}]);setNw('')};
  const sorted=[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date));const latest=sorted[0];
  const delta=latest?Math.round((latest.weight-profile.goalWeight)*10)/10:null;
  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    {latest&&<div style={{background:"linear-gradient(135deg,#7B5EA7,#9B7EC8)",borderRadius:20,padding:"18px 20px",color:"#fff"}}>
      <div style={{fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",opacity:.6}}>Ultimo peso</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:6}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:32,fontWeight:800}}>{latest.weight} <span style={{fontSize:16,fontWeight:500}}>kg</span></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:13,opacity:.8}}>{delta>0?`−${delta} kg al traguardo`:"Obiettivo raggiunto!"}</div><div style={{fontSize:11,opacity:.5}}>{latest.date.split('-').reverse().join('/')}</div></div>
      </div>
    </div>}
    <div style={{background:"#fff",borderRadius:16,padding:16,border:"1.5px solid #f0ede8"}}>
      <div style={{fontSize:12,fontWeight:600,color:"#8a8580",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Andamento</div>
      <WeightChart entries={entries} goalWeight={profile.goalWeight}/>
    </div>
    <div style={{background:"#fff",borderRadius:16,padding:16,border:"1.5px solid #f0ede8"}}>
      <div style={{fontSize:12,fontWeight:600,color:"#8a8580",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Aggiungi pesata</div>
      <div style={{display:"flex",gap:8}}><input type="date" value={nd} onChange={e=>setNd(e.target.value)} style={{flex:1}}/><input type="number" step="0.1" placeholder="kg" value={nw} onChange={e=>setNw(e.target.value)} style={{width:80}}/><button onClick={add} style={{padding:"10px 18px",borderRadius:10,border:"none",background:"#7B5EA7",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>+</button></div>
    </div>
    {sorted.length>0&&<div style={{background:"#fff",borderRadius:16,padding:16,border:"1.5px solid #f0ede8"}}>
      <div style={{fontSize:12,fontWeight:600,color:"#8a8580",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Storico ({sorted.length})</div>
      {sorted.slice(0,20).map((e,i)=><div key={e.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<Math.min(sorted.length,20)-1?"1px solid #f5f3ee":"none"}}>
        <div><span style={{fontSize:14,fontWeight:600}}>{e.weight} kg</span><span style={{fontSize:12,color:"#b0a89e",marginLeft:8}}>{e.date.split('-').reverse().join('/')}</span></div>
        <button onClick={()=>setE(p=>p.filter(x=>x.date!==e.date))} style={{padding:"4px 10px",borderRadius:8,border:"1.5px solid #e8e4de",background:"transparent",fontSize:12,color:"#C4563A",cursor:"pointer",fontWeight:600}}>✕</button>
      </div>)}
    </div>}
  </div>);
}

/* ═══ UI COMPONENTS ═══ */
function Pill({label,value,unit,color}){return<span style={{display:"inline-flex",alignItems:"center",gap:3,background:color+"18",color,padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600}}>{label} <b>{value}</b>{unit}</span>}
function SliderC({label,value,min,max,step,unit,color,onChange}){
  return(<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:"#5a5550"}}>{label}</span><span style={{fontFamily:"'Fraunces',serif",fontSize:20,fontWeight:700,color}}>{value}<span style={{fontSize:12,fontWeight:500,color:"#8a8580"}}> {unit}</span></span></div>
  <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(Number(e.target.value))} style={{background:`linear-gradient(to right,${color} 0%,${color} ${((value-min)/(max-min))*100}%,#e8e4de ${((value-min)/(max-min))*100}%,#e8e4de 100%)`}}/><style>{`input[type=range]::-webkit-slider-thumb{background:${color}}`}</style>
  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#b0a89e",marginTop:3}}><span>{min}{unit}</span><span>{max}{unit}</span></div></div>);

function OptBtns({options,value,onChange,color}){return(<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{options.map(o=><button key={o.id} onClick={()=>onChange(o.id)} style={{flex:1,minWidth:85,padding:"10px 6px",borderRadius:12,border:value===o.id?`2px solid ${color}`:"2px solid #e8e4de",background:value===o.id?color+"12":"#fff",cursor:"pointer",textAlign:"center",transition:"all .2s"}}><div style={{fontSize:12,fontWeight:700,color:value===o.id?color:"#5a5550"}}>{o.label}</div>{o.desc&&<div style={{fontSize:10,color:"#8a8580",marginTop:2}}>{o.desc}</div>}</button>)}</div>)}

      <div><label style={{fontSize:10,color:"#8a8580",fontWeight:600,display:"block",marginBottom:2}}>GRASSI (g)</label><input type="number" min="0" max="150" value={c.g||0} onChange={e=>upd("g",Number(e.target.value))}/></div>

function ProfilePanel({profile:p,setProfile:setP}){
  const set=(k,v)=>setP(prev=>({...prev,[k]:v}));

  const defPct=(DEFL.find(d=>d.id===p.deficit)||DEFL[1]).p,dailyDef=Math.round(td*defPct),wl=(dailyDef*7)/7700;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{background:"linear-gradient(135deg,#2a2520,#4a4540)",borderRadius:20,padding:20,color:"#fff"}}>

      {weeks>0&&<div style={{textAlign:"center",marginTop:12,fontSize:12,opacity:.7}}>Deficit: <b>{dailyDef} kcal/g</b> · ~<b>{wl.toFixed(1)} kg/sett</b> · Obiettivo in <b style={{color:"#7dd3a8"}}>~{weeks} sett</b> (~{Math.round(weeks/4.33)} mesi)</div>}

      <div style={{display:"flex",gap:8}}>{[{id:"F",l:"👩 Donna"},{id:"M",l:"👨 Uomo"}].map(x=><button key={x.id} onClick={()=>set("sex",x.id)} style={{flex:1,padding:12,borderRadius:12,border:p.sex===x.id?"2px solid #7B5EA7":"2px solid #e8e4de",background:p.sex===x.id?"#F0EBF7":"#fff",fontSize:15,fontWeight:700,color:p.sex===x.id?"#7B5EA7":"#8a8580",cursor:"pointer"}}>{x.l}</button>)}</div>
    </div>
    <div style={{background:"#fff",borderRadius:16,padding:16,border:"1.5px solid #f0ede8"}}><div style={{fontSize:12,fontWeight:600,color:"#8a8580",textTransform:"uppercase",letterSpacing:".08em",marginBottom:14}}>Dati antropometrici</div>
      <SliderC label="Età" value={p.age} min={16} max={70} step={1} unit="anni" color="#7B5EA7" onChange={v=>set("age",v)}/>

  const meta=MM[sk];const isCustom=meal.isCustom;

      <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:20}}>{isCustom?"✏️":meta.icon}</span><div><div style={{fontSize:10,fontWeight:600,color:accent,textTransform:"uppercase",letterSpacing:".08em"}}>{meta.label} <span style={{opacity:.6}}>({tgtKcal})</span></div><div style={{fontSize:15,fontWeight:700,color:"#2a2520",fontFamily:"'Fraunces',serif",lineHeight:1.2,marginTop:1}}>{meal.title}</div></div></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{background:accent+"15",color:accent,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700}}>{sK}</span><span style={{fontSize:14,color:accent,transform:isOpen?"rotate(180deg)":"",transition:"transform .3s",display:"inline-block"}}>▾</span></div>
    </div>

        {isCustom?<CustomMealEditor custom={custom} onChange={onCustomChange} accent={accent} suggestedKcal={tgtKcal}/>:<>
          {meal.t&&meal.t.length>0&&<div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>{meal.t.map(tag=>{const fd=FD.find(f=>f.id===tag);return fd?<span key={tag} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:fd.c+"15",color:fd.c,fontWeight:600}}>{fd.label}</span>:null})}</div>}

        </>}
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}><Pill label="P" value={sP} unit="g" color="#E07B5B"/><Pill label="C" value={sC} unit="g" color="#D4A13A"/><Pill label="G" value={sG} unit="g" color="#5B8A72"/></div>
        {meal.tip&&!isCustom&&<div style={{marginTop:10,padding:"10px 12px",background:accent+"0A",borderRadius:10,borderLeft:`3px solid ${accent}40`,fontSize:13,color:"#6b6560",fontStyle:"italic",lineHeight:1.5}}>💡 {meal.tip}</div>}
      </div>
    </div>
  </div>);
}

function WBar({cur,tar}){const pct=Math.min((cur/tar)*100,110),diff=cur-tar,over=diff>300,under=diff<-500,col=over?"#C4563A":under?"#D4A13A":"#4A7C59";
  return(<div style={{background:"#fff",borderRadius:18,padding:"16px 18px",marginBottom:16,border:"1.5px solid #f0ede8"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".1em",color:"#b0a89e"}}>Bilancio Settimanale</div><div style={{fontFamily:"'Fraunces',serif",fontSize:13,fontWeight:700,color:col}}>{diff>0?"+":""}{diff} kcal</div></div>
    <div style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:800,marginBottom:8}}>{cur.toLocaleString("it-IT")} <span style={{fontSize:13,fontWeight:500,color:"#8a8580"}}>/ {tar.toLocaleString("it-IT")}</span></div>
    <div style={{background:"#f0ede8",borderRadius:10,height:10,overflow:"hidden"}}><div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:`linear-gradient(90deg,${col}cc,${col})`,borderRadius:10,transition:"width .5s"}}/></div>
    <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:"#b0a89e"}}><span>0</span><span style={{fontWeight:600,color:col}}>{over?"⚠️ Sopra":under?"⚠️ Basso":"✓ In target"}</span><span>{tar.toLocaleString("it-IT")}</span></div>
  </div>);
}

function ShopList({sel,prof,customs}){
  const grouped=useMemo(()=>buildShop(sel,prof,customs),[sel,prof,customs]);
  const[chk,setChk]=useState({});const tog=k=>setChk(p=>({...p,[k]:!p[k]}));
  const cats=["prot","latt","cer","fv","cond","surg"];
  if(!cats.some(c=>grouped[c]&&grouped[c].length))return<div style={{textAlign:"center",padding:40,color:"#b0a89e"}}>Nessun ingrediente<br/><span style={{fontSize:11}}>(i pasti liberi non generano lista)</span></div>;
  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>{cats.map(ck=>{const items=grouped[ck];if(!items||!items.length)return null;
    return(<div key={ck} style={{background:"#fff",borderRadius:16,padding:"14px 16px",border:"1.5px solid #f0ede8"}}>
      <div style={{fontSize:14,fontWeight:700,fontFamily:"'Fraunces',serif",marginBottom:8,paddingBottom:6,borderBottom:"1px dashed #e8e4de"}}>{CAT[ck]}</div>
      {items.map((it,idx)=>{const k=ck+it.item;const done=chk[k];return(<div key={idx} onClick={()=>tog(k)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",cursor:"pointer",borderBottom:idx<items.length-1?"1px solid #faf8f5":"none",opacity:done?.4:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:22,height:22,borderRadius:6,border:done?"2px solid #4A7C59":"2px solid #d0cbc4",background:done?"#4A7C59":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}</div><span style={{fontSize:14,textDecoration:done?"line-through":"none"}}>{it.item}</span></div>
        <span style={{fontSize:11,color:"#b0a89e",whiteSpace:"nowrap",marginLeft:8}}>{[...new Set(it.days)].join(", ")}</span></div>)})}
    </div>)})}</div>);
}

/* ═══ MAIN APP ═══ */
function App(){
  const[ad,setAd]=useState(0),[sel,setSel]=useState(initSel),[os,setOs]=useState(null),[tab,setTab]=useState("planner"),[prof,setProf]=useState(lp),[customs,setCustoms]=useState(lc),[saving,setSav]=useState(false);
  useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(sel))}catch(e){}},[sel]);
  useEffect(()=>{try{localStorage.setItem(PK,JSON.stringify(prof))}catch(e){}},[prof]);
  useEffect(()=>{try{localStorage.setItem(CK,JSON.stringify(customs))}catch(e){}},[customs]);

  const{target}=calcMacros(prof);const wTar=target*7;const filters=prof.filters||[];
  const upd=(d,k,v)=>setSel(p=>({...p,[d]:{...p[d],[k]:v}}));
  const togSoc=d=>{setSel(p=>({...p,[d]:{...p[d],social:!p[d].social}}));setOs(null)};
  const updCustom=(dayIdx,slot,newCustom)=>setCustoms(p=>({...p,[customKey(dayIdx,slot)]:newCustom}));
  const wTot=useMemo(()=>{let t=0;for(let i=0;i<7;i++)t+=dayKcal(sel,i,prof,customs);return t},[sel,prof,customs]);

  const meals=getMeals(sel,ad,filters,customs);const dK=dayKcal(sel,ad,prof,customs);
  const s=sel[ad];const accent=DC[ad];const isSoc=s.social;

  const activeSlots=SLOTS.filter(sl=>isSlotActive(sl,prof));
  const slotCfg=(isSoc?[
    {key:"colazione",opts:pwc(SC,filters),sk:"socialColazione"},{key:"spuntino1",opts:pwc(SS1,filters),sk:"socialSpuntino1"},
    {key:"pranzo",opts:pwc(SP,filters),sk:"socialPranzo"},{key:"spuntino2",opts:pwc(SS2,filters),sk:"socialSpuntino2"},
    {key:"cena",opts:pwc(M.social,filters),sk:"socialCena"},
  ]:[
    {key:"colazione",opts:pwc(M.colazione,filters),sk:"colazione"},{key:"spuntino1",opts:pwc(M.spuntino1,filters),sk:"spuntino1"},
    {key:"pranzo",opts:pwc(M.pranzo,filters),sk:"pranzo"},{key:"spuntino2",opts:pwc(M.spuntino2,filters),sk:"spuntino2"},
    {key:"cena",opts:pwc(M.cena,filters),sk:"cena"},
  ]).filter(c=>activeSlots.includes(c.key));

  const doDownload=useCallback(()=>{setSav(true);setTimeout(()=>{
    const h=`<!DOCTYPE html><html><head><meta charset=utf-8><title>Piano</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;color:#2a2520;padding:20px;font-size:11px;line-height:1.5}h1{font-size:20px;text-align:center;margin-bottom:4px}.sub{text-align:center;color:#8a8580;font-size:10px;margin-bottom:12px}.day{margin-bottom:10px;border:1px solid #e8e4de;border-radius:8px;padding:8px 12px}.dh{display:flex;justify-content:space-between;margin-bottom:4px;border-bottom:1px solid #f0ede8;padding-bottom:4px;font-weight:700}.ms{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}.ml{font-size:8px;font-weight:600;text-transform:uppercase;color:#b0a89e}.mt{font-weight:700;font-size:11px}.mi{font-size:9px;color:#5a5550}.wb{text-align:center;margin-bottom:12px;padding:6px;background:#f8f6f3;border-radius:6px;font-weight:700;font-size:14px}.shop{page-break-before:always}.shop h2{font-size:16px;text-align:center;margin-bottom:8px}.sc{margin-bottom:6px}.sct{font-weight:700;font-size:11px;border-bottom:1px solid #e8e4de;padding-bottom:2px;margin-bottom:2px}.si{display:flex;justify-content:space-between;padding:1px 0;font-size:10px}.ch{display:inline-block;width:10px;height:10px;border:1px solid #ccc;border-radius:2px;margin-right:5px;vertical-align:middle}</style></head><body>`+
    `<h1>🍽️ Piano Settimanale</h1><div class=sub>👤 ${prof.sex==="F"?"F":"M"} ${prof.age}a · ${prof.height}cm · ${prof.weight}→${prof.goalWeight}kg · 🎯${target}kcal · ${(DIST.find(d=>d.id===prof.dist)||DIST[0]).label}</div>`+
    `<div class=wb>${wTot.toLocaleString("it-IT")} / ${wTar.toLocaleString("it-IT")} kcal</div>`+
    Array.from({length:7},(_,i)=>{const ms=getMeals(sel,i,filters,customs);const d=dayKcal(sel,i,prof,customs);return`<div class=day><div class=dh><span>${DE[i]} ${DN[i]}${sel[i].social?' 🥂':''}</span><span style="color:#4A7C59">${d} kcal</span></div><div class=ms>${activeSlots.map(sk=>{const m=ms[sk];const sc=slotScale(sk,prof);const k=m.isCustom?m.kcal:Math.round(m.kcal*sc);const pv=m.isCustom?m.p:Math.round(m.p*sc);const cv=m.isCustom?m.c:Math.round(m.c*sc);const gv=m.isCustom?m.g:Math.round(m.g*sc);return`<div><div class=ml>${m.isCustom?"✏️":MM[sk].icon} ${MM[sk].label}</div><div class=mt>${m.title}</div><div class=mi>${m.items.join(' · ')}</div><div style="font-size:8px;color:#8a8580">${k}kcal P${pv}g C${cv}g G${gv}g</div></div>`}).join('')}</div></div>`}).join('')+
    (()=>{const shop=buildShop(sel,prof,customs);let out=`<div class=shop><h2>🛒 Lista della Spesa</h2>`;Object.entries(CAT).forEach(([ck,cl])=>{const items=shop[ck];if(!items||!items.length)return;out+=`<div class=sc><div class=sct>${cl}</div>${items.map(it=>`<div class=si><span><span class=ch></span>${it.item}</span><span style="color:#8a8580;font-size:9px">${[...new Set(it.days)].join(', ')}</span></div>`).join('')}</div>`});return out+'</div>'})()+'</body></html>';
    const blob=new Blob([h],{type:'text/html'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='piano_settimanale.html';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);setSav(false)},200)},100)},[sel,prof,customs]);

  return(<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#faf8f5,#f5f1ec)"}}>
    <div style={{maxWidth:540,margin:"0 auto",padding:"calc(env(safe-area-inset-top,12px)+12px) 16px 120px"}}>
      <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:10,fontWeight:600,letterSpacing:".16em",textTransform:"uppercase",color:"#b0a89e",marginBottom:4}}>Il tuo piano personalizzato</div>
        <h1 style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:800,color:"#2a2520",margin:0}}>Meal Planner</h1>
        <p style={{fontSize:13,color:"#8a8580",marginTop:4}}>~{target} kcal · {(DIST.find(d=>d.id===prof.dist)||DIST[0]).label.replace(/^[^ ]+ /,'')}</p>
      </div>

      {tab==="planner"&&<WBar cur={wTot} tar={wTar}/>}
      <div style={{display:"flex",gap:3,marginBottom:18,background:"#fff",borderRadius:14,padding:3,border:"1.5px solid #f0ede8"}}>
        {[{id:"planner",l:"🍽️ Piano"},{id:"shopping",l:"🛒 Spesa"},{id:"weight",l:"📊 Peso"},{id:"profile",l:"⚙️ Profilo"}].map(t=><button key={t.id} onClick={()=>{setTab(t.id);setOs(null)}} style={{flex:1,padding:"10px 0",borderRadius:11,border:"none",background:tab===t.id?"#2a2520":"transparent",color:tab===t.id?"#fff":"#8a8580",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .25s"}}>{t.l}</button>)}
      </div>

      {tab==="planner"&&<>
        <div style={{display:"flex",gap:5,justifyContent:"center",marginBottom:18,flexWrap:"wrap"}}>
          {DN.map((name,i)=>{const isA=i===ad,isSc=sel[i].social;return<button key={i} onClick={()=>{setAd(i);setOs(null)}} style={{padding:"8px 12px",borderRadius:12,cursor:"pointer",border:isA?`2px solid ${DC[i]}`:"2px solid transparent",background:isA?DCL[i]:"#fff",color:isA?DC[i]:"#8a8580",fontWeight:isA?700:500,fontSize:13,transition:"all .25s",position:"relative"}}><span style={{fontSize:15}}>{isSc?"🥂":DE[i]}</span><span style={{marginLeft:3}}>{name.substring(0,3)}</span>{isSc&&<span style={{position:"absolute",top:-4,right:-4,width:10,height:10,background:"#E07B9B",borderRadius:"50%",border:"2px solid #faf8f5"}}/>}</button>})}
        </div>
        <div style={{background:`linear-gradient(135deg,${accent},${accent}cc)`,borderRadius:20,padding:"18px 20px",marginBottom:14,color:"#fff",boxShadow:`0 8px 30px ${accent}30`,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-10,fontSize:80,opacity:.12}}>{isSoc?"🥂":DE[ad]}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div style={{fontSize:10,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",opacity:.8}}>{isSoc?"Social Night 🎉":DN[ad]}</div><div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:800,marginTop:3}}>{DN[ad]}</div></div>
            <button onClick={()=>togSoc(ad)} style={{padding:"8px 16px",borderRadius:12,cursor:"pointer",border:isSoc?"2px solid rgba(255,255,255,.6)":"2px solid rgba(255,255,255,.3)",background:isSoc?"rgba(255,255,255,.25)":"rgba(255,255,255,.1)",color:"#fff",fontSize:13,fontWeight:600}}>{isSoc?"✓ Social":"🥂 Social"}</button>
          </div>
          <div style={{display:"flex",gap:12,marginTop:12,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:700}}>{dK} kcal</span><span style={{opacity:.5}}>|</span>
            <span style={{fontSize:12,opacity:.85}}>P {activeSlots.reduce((a,sl)=>{const m=meals[sl];return a+(m.isCustom?m.p:Math.round(m.p*slotScale(sl,prof)))},0)}g · C {activeSlots.reduce((a,sl)=>{const m=meals[sl];return a+(m.isCustom?m.c:Math.round(m.c*slotScale(sl,prof)))},0)}g · G {activeSlots.reduce((a,sl)=>{const m=meals[sl];return a+(m.isCustom?m.g:Math.round(m.g*slotScale(sl,prof)))},0)}g</span>
          </div>
        </div>
        {isSoc&&<div style={{background:"linear-gradient(135deg,#FDF0F3,#FFF4E6)",borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",gap:10,alignItems:"center",border:"1.5px solid #f0ddd5"}}><span style={{fontSize:24}}>💡</span><div style={{fontSize:13,color:"#6b6560",lineHeight:1.5}}><b style={{color:"#C4563A"}}>Buffer attivo.</b> Pasti leggeri, serata libera!</div></div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {slotCfg.map(({key,opts,sk})=><MealSlot key={key+(isSoc?"s":"n")} sk={key} meal={meals[key]} accent={accent} options={opts} selId={s[sk]} onSel={v=>upd(ad,sk,v)} isOpen={os===key} onTog={()=>setOs(os===key?null:key)} sc={slotScale(key,prof)} tgtKcal={slotTargetKcal(key,prof)} custom={customs[customKey(ad,key)]} onCustomChange={newC=>updCustom(ad,key,newC)}/>)}
        </div>
        <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:16,flexWrap:"wrap"}}>
          {DN.map((_,i)=>{const dki=dayKcal(sel,i,prof,customs),delta=dki-target;const c=Math.abs(delta)<=Math.round(target*.08)?"#4A7C59":delta>0?"#C4563A":"#D4A13A";
            return<div key={i} onClick={()=>{setAd(i);setOs(null)}} style={{width:66,padding:"7px 4px",borderRadius:10,textAlign:"center",cursor:"pointer",background:i===ad?accent+"12":"#fff",border:i===ad?`1.5px solid ${accent}40`:"1.5px solid #f0ede8"}}><div style={{fontSize:9,fontWeight:600,color:"#b0a89e"}}>{DS[i]}</div><div style={{fontSize:13,fontWeight:700,color:c,fontFamily:"'Fraunces',serif",marginTop:2}}>{dki}</div><div style={{fontSize:8,color:c,fontWeight:600}}>{delta>0?`+${delta}`:delta}</div></div>})}
        </div>
      </>}
      {tab==="shopping"&&<ShopList sel={sel} prof={prof} customs={customs}/>}
      {tab==="weight"&&<WeightTracker profile={prof}/>}
      {tab==="profile"&&<ProfilePanel profile={prof} setProfile={setProf}/>}
    </div>
    <div className="no-print" style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(250,248,245,.92)",backdropFilter:"blur(12px)",borderTop:"1px solid #e8e4de",padding:`12px 16px calc(env(safe-area-inset-bottom,8px)+8px)`,display:"flex",justifyContent:"center"}}>
      <button onClick={doDownload} disabled={saving} style={{maxWidth:540,width:"100%",padding:"16px 24px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#2a2520,#4a4540)",color:"#fff",fontSize:15,fontWeight:700,cursor:saving?"wait":"pointer",boxShadow:"0 4px 20px rgba(42,37,32,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:saving?.7:1}}>
        {saving?"⏳ Generazione...":"📥 Scarica Piano Stampabile"}
      </button>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){const S=`const C='mp-v5';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)))});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([S],{type:'application/javascript'}))).catch(()=>{})}</script>
</body>
